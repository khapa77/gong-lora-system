; ============================================================
;  Gong LoRa CLIENT — PlatformIO configuration
;  Flash as many clients as you need (change CLIENT_ID each time)
; ============================================================
[env:esp32dev]
platform  = espressif32 @ 6.7.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

board_build.filesystem = spiffs
board_build.partitions = partitions_large_spiffs.csv

lib_deps =
    bblanchon/ArduinoJson          @ ^6.21.5
    jgromes/RadioLib               @ ^6.6.0
    https://github.com/schreibfaul1/ESP32-audioI2S#2.0.6

build_flags =
    -DCORE_DEBUG_LEVEL=3
