[env:esp32dev]
; Official platform to avoid ADC driver_ng vs legacy conflict (pioarduino stable triggered it)
platform     = espressif32 @ 6.7.0 
board        = esp32dev
framework    = arduino

monitor_speed  = 115200
upload_speed   = 921600

board_build.filesystem = spiffs
; ~2.5 МБ под SPIFFS (два MP3 по ~1 МБ + веб/конфиги). Без OTA.
board_build.partitions = partitions_large_spiffs.csv

lib_deps =
    bblanchon/ArduinoJson          @ ^6.21.5
    arduino-libraries/NTPClient    @ ^3.2.1
    jgromes/RadioLib               @ ^6.6.0
    https://github.com/schreibfaul1/ESP32-audioI2S#2.0.6


build_flags =
    -DCORE_DEBUG_LEVEL=3


