; ============================================================
;  Gong LoRa SERVER — PlatformIO configuration
; ============================================================
[env:esp32dev]
platform  = espressif32 @ ^6.3.2
board     = esp32dev
framework = arduino

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    sandeepmistry/LoRa    @ ^0.8.0
    arduino-libraries/NTPClient @ ^3.2.1
    dfrobot/DFRobotDFPlayerMini @ ^1.0.6

; SPIFFS: upload data/ folder separately via:
;   pio run -t uploadfs
board_build.filesystem = spiffs

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
